# ConStory-Bench Model Configuration
# Each model entry defines:
#   name:         Display name (used in leaderboard tables)
#   eval_file:    Evaluation CSV filename (in evaluations/ directory)
#   story_column: Column name containing the generated story text in the CSV
#   category:     Model category for grouping
#   organization: Organization / company

